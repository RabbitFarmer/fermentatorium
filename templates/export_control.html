<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Export Result</title>
  <link rel="stylesheet" href="/static/styles.css">
  <meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body>
  <div class="page-container">
    <h1 class="dashboard-title">{{ system_settings.brewery_name }}</h1>
    <h2 style="text-align:center; font-size:1.4em; color:#444; margin-bottom:20px;">Export Status</h2>

    <div style="max-width:600px; margin:0 auto; background:#fff; border-radius:8px; padding:24px; box-shadow:0 1px 6px rgba(0,0,0,0.06);">
      <p>{{ message }}</p>
      <p>You can retrieve the file from <strong>/export/</strong> on your system.</p>
      <div style="text-align:center; margin-top:20px;">
        <a href="/" class="btn-action">Return to Dashboard</a>
      </div>
    </div>
  </div>
</body>
</html>
