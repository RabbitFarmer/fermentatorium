<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goodbye</title>
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }
    .goodbye-container {
      text-align: center;
      color: white;
      padding: 40px;
      animation: fadeIn 1s ease-in;
    }
    .goodbye-title {
      font-size: 5em;
      font-weight: bold;
      margin: 0;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
      animation: slideDown 0.8s ease-out;
    }
    .goodbye-message {
      font-size: 1.5em;
      margin-top: 20px;
      opacity: 0.9;
      animation: fadeIn 1.5s ease-in;
    }
    .beer-icon {
      width: 150px;
      height: 150px;
      margin: 30px auto;
      animation: bounce 2s infinite;
    }
    .kiosk-exit-btn {
      margin-top: 32px;
      background: rgba(255,255,255,0.2);
      color: white;
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 20px;
      padding: 8px 20px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .kiosk-exit-btn:hover { background: rgba(255,255,255,0.3); }
    .kiosk-exit-btn.confirming {
      background: #c0392b;
      border-color: #c0392b;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideDown {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
  </style>
</head>
<body>
  <div class="goodbye-container">
    <img src="/static/beer-stein.svg" alt="Beer Stein" class="beer-icon">
    <h1 class="goodbye-title">Goodbye!</h1>
    <p class="goodbye-message">{{ brewery_name }} is shutting down.</p>
    <p class="goodbye-message">See you next brew!</p>
    <button class="kiosk-exit-btn" id="goodbyeExitBtn" title="Click twice to close the browser window">✕ Close Window</button>
  </div>
  <script>
  // Two-click confirmation to close the browser window from the goodbye page.
  // The Flask server is shutting down so we use window.close() here rather
  // than posting to /exit_system (which may already be offline).
  (function () {
    var btn = document.getElementById('goodbyeExitBtn');
    if (!btn) return;
    var confirmTimer = null;
    btn.addEventListener('click', function () {
      if (confirmTimer) {
        clearTimeout(confirmTimer);
        confirmTimer = null;
        window.close();
      } else {
        btn.classList.add('confirming');
        btn.textContent = '✕ Confirm close?';
        confirmTimer = setTimeout(function () {
          confirmTimer = null;
          btn.classList.remove('confirming');
          btn.textContent = '✕ Close Window';
        }, 3000);
      }
    });
  }());
  </script>
</body>
</html>
