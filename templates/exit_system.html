<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exit System</title>
  <link rel="stylesheet" href="/static/styles.css">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    .exit-warning {
      color: #c00;
      font-weight: bold;
      font-size: 1.2em;
      margin: 30px 0 20px 0;
      text-align: center;
    }
    .center-form {
      text-align: center;
      margin-top: 30px;
    }
    .btn-exit {
      background: #c00;
      color: white;
      border: 2px solid #c00;
      border-radius: 7px;
      font-size: 1.15em;
      min-width: 120px;
      padding: 10px 16px;
      margin: 0 8px;
      cursor: pointer;
      font-weight: bold;
    }
    .btn-cancel {
      background: #bbb;
      color: #222;
      border: 2px solid #999;
      border-radius: 7px;
      font-size: 1.15em;
      min-width: 120px;
      padding: 10px 16px;
      margin: 0 8px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="page-container">
    <h1 class="dashboard-title">EXIT SYSTEM</h1>
    <div style="max-width:500px; margin:0 auto; background:#fff; border-radius:8px; padding:30px; box-shadow:0 1px 6px rgba(0,0,0,0.06); text-align:center;">
      <div class="exit-warning">
        Are you sure you want to shut down the system?<br>
        All plugs will be turned OFF. The application and browser will close,
        and the computer will power off.<br>
        <br>
        <b>This cannot be undone!</b>
      </div>
      <div class="center-form">
        <form method="post" action="/exit_system" style="display:inline;">
          <button type="submit" class="btn-exit" name="confirm" value="yes">YES, SHUT DOWN</button>
        </form>
        <form method="post" action="/exit_system" style="display:inline;">
          <button type="submit" class="btn-cancel" name="confirm" value="no">Cancel</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
