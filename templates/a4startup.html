<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starting Up…</title>
  <link rel="icon" type="image/svg+xml" href="/static/a4beer-stein.svg">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    .startup-container {
      text-align: center;
      color: white;
      padding: 40px;
      animation: fadeIn 0.8s ease-in;
    }
    .beer-icon { width: 150px; height: 150px; margin: 0 auto 30px; animation: bounce 2s infinite; }
    .startup-title { font-size: 4em; font-weight: bold; margin: 20px 0; text-shadow: 3px 3px 10px rgba(0,0,0,0.5); animation: slideDown 0.8s ease-out; }
    .startup-message { font-size: 2em; margin-top: 20px; opacity: 0.9; animation: fadeIn 1.5s ease-in; }
    .status-line { font-size: 1em; margin-top: 16px; opacity: 0.65; min-height: 1.4em; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    @keyframes ellipsis { 0%, 20% { opacity: 0; } 40% { opacity: 1; } 100% { opacity: 0; } }
    .dot1 { animation: ellipsis 1.4s infinite 0s; }
    .dot2 { animation: ellipsis 1.4s infinite 0.2s; }
    .dot3 { animation: ellipsis 1.4s infinite 0.4s; }
    .spinner { margin: 40px auto 0; width: 80px; height: 80px; position: relative; }
    .spinner-ring { display: block; width: 80px; height: 80px; border: 8px solid rgba(255,255,255,0.2); border-top-color: #FFD700; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
  <script>
    var attempts = 0;
    var MAX_ATTEMPTS = 45;  // ~90 s total wait time
    var statusEl;

    function setStatus(msg) {
      if (statusEl) statusEl.textContent = msg;
    }

    function checkAppReady() {
      attempts++;
      if (attempts > MAX_ATTEMPTS) {
        setStatus('Taking longer than expected — redirecting…');
        setTimeout(function() { window.location.href = '/'; }, 2000);
        return;
      }
      fetch('/', { cache: 'no-store' })
        .then(function(response) {
          if (response.ok) {
            setStatus('Dashboard ready — loading…');
            window.location.href = '/';
          } else {
            setStatus('Server responded — warming up (' + attempts + ')…');
            setTimeout(checkAppReady, 2000);
          }
        })
        .catch(function() {
          setStatus('Waiting for server… (' + attempts + '/' + MAX_ATTEMPTS + ')');
          setTimeout(checkAppReady, 2000);
        });
    }

    window.addEventListener('DOMContentLoaded', function() {
      statusEl = document.getElementById('status-line');
      setStatus('Connecting to server…');

      // Unregister any stale service workers before polling starts.
      // A service worker from a previous version can serve old cached HTML
      // to every page — including this one — even after clearing browser cache.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          if (registrations.length > 0) {
            console.warn('[fermentatorium] Startup: unregistering ' +
              registrations.length + ' stale service worker(s).');
            registrations.forEach(function(reg) { reg.unregister(); });
          }
        });
      }

      // Start polling quickly; the server is usually already up when this page loads.
      setTimeout(checkAppReady, 500);
    });
  </script>
</head>
<body>
  <div class="startup-container">
    <img src="/static/a4beer-stein.svg" alt="Beer Stein" class="beer-icon">
    <h1 class="startup-title">It's Coming</h1>
    <p class="startup-message">Please wait, starting up<span class="dot1">.</span><span class="dot2">.</span><span class="dot3">.</span></p>
    <p class="status-line" id="status-line"></p>
    <div class="spinner"><div class="spinner-ring"></div></div>
  </div>
</body>
</html>
